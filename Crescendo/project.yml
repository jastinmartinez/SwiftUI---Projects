name: Crescendo

options:
  defaultSourceDirectoryType: syncedFolder
  deploymentTarget:
    iOS: "18.0"
  minimumXcodeGenVersion: 2.45.4

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    exactVersion: 1.26.0

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  Crescendo:
    type: application
    platform: iOS
    sources:
      - path: Crescendo
    entitlements:
      path: Crescendo/Crescendo.entitlements
      properties:
        com.apple.developer.music-user-token: true
    attributes:
      SystemCapabilities:
        com.apple.Music:
          enabled: 1
    dependencies:
      - package: ComposableArchitecture
        product: ComposableArchitecture
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSAppleMusicUsageDescription: Crescendo uses Apple Music access to search and play catalog songs in this learning demo.
        PRODUCT_BUNDLE_IDENTIFIER: com.jastin.Crescendo

  CrescendoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CrescendoTests
    dependencies:
      - target: Crescendo
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jastin.CrescendoTests

schemes:
  Crescendo:
    build:
      targets:
        Crescendo: all
        CrescendoTests: [test]
    test:
      targets:
        - CrescendoTests
